<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نابلس لتأجير السيارات - Nablus Car Rental</title>
    
    <meta name="description" content="شركة نابلس لتأجير السيارات - أفضل وأحدث السيارات السياحية في نابلس بأفضل الأسعار (اكسنت، فينو، بيكانتو). احجز سيارتك الآن بسهولة عبر الواتساب.">
    <meta name="keywords" content="تأجير سيارات في نابلس, شركة تأجير سيارات نابلس, حجز سيارات نابلس, نابلس لتأجير السيارات, rent a car Nablus, سيارات سياحية نابلس, اكسنت للايجار نابلس">
    <meta name="author" content="نابلس لتأجير السيارات">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #dfb035; /* اللون الذهبي الفخم المأخوذ من لوغو الشركة */
            --dark-color: #0d0d0d;
            --light-color: #f4f4f4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.9)), url('banner.jpg') no-repeat center top fixed;
            background-size: cover;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 30px;
        }

        header {
            text-align: center;
            padding: 40px 20px 20px 20px;
            width: 100%;
        }

        /* حاوية اللوغو الرسمي للشركة */
        .logo-container {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 25px;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 20px rgba(223, 176, 53, 0.2);
            margin-bottom: 10px;
        }

        .logo-text {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }

        .logo-subtext {
            font-size: 0.9rem;
            color: #ccc;
            letter-spacing: 4px;
            margin-top: 3px;
            text-transform: uppercase;
        }

        .container {
            width: 92%;
            max-width: 650px;
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        /* ألبوم السيارات التفاعلي (السلايدر) */
        .carousel-container {
            position: relative;
            width: 100%;
            height: 380px;
            overflow: hidden;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 2px solid var(--primary-color);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .car-slide {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .car-slide.active {
            display: block;
        }

        .car-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* تفاصيل ومواصفات السيارة فوق الصورة مباشرة */
        .car-info {
            position: absolute;
            bottom: 0;
            right: 0;
            left: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.95) 70%);
            padding: 25px 20px;
            text-align: right;
        }

        .car-name {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }

        .car-price {
            font-size: 1.4rem;
            color: var(--primary-color);
            margin-top: 6px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }

        /* أسهم التنقل (يمين وشمال) */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            width: 45px;
            height: 45px;
            font-size: 1.4rem;
            cursor: pointer;
            border-radius: 50%;
            transition: 0.3s;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .arrow:hover {
            background: var(--primary-color);
            color: #000;
            box-shadow: 0 0 10px var(--primary-color);
        }

        .arrow-next { left: 15px; }
        .arrow-prev { right: 15px; }

        /* قسم تواصل معنا المباشر */
        .contact-section {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 15px;
        }

        .contact-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            color: #fff;
            transition: 0.3s;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-phone { background-color: #1e6cd9; }
        .btn-whatsapp { background-color: #20ba56; }
        
        .contact-btn:hover {
            opacity: 0.9;
            transform: translateY(-3px);
        }

        /* نموذج الحجز السريع لتبويب "احجز الآن" */
        .booking-form h3 {
            color: var(--primary-color);
            margin-bottom: 18px;
            border-bottom: 2px solid #2a2a2a;
            padding-bottom: 8px;
            font-size: 1.3rem;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.95rem;
            color: #ddd;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #181818;
            color: #fff;
            font-size: 1rem;
            text-align: right;
            transition: 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 8px rgba(223, 176, 53, 0.3);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color), #b88f21);
            color: #000;
            border: none;
            padding: 15px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(223, 176, 53, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(223, 176, 53, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-text">نابلس</div>
            <div class="logo-subtext">Nablus Car Rental</div>
        </div>
    </header>

    <div class="container">

        <div class="carousel-container">
            <button class="arrow arrow-prev" onclick="changeSlide(1)"><i class="fas fa-chevron-right"></i></button>
            
            <div class="car-slide active">
                <img src="accent-white.jpg" alt="هيونداي أكسنت بيضاء">
                <div class="car-info">
                    <div class="car-name">هيونداي أكسنت (2019 - 2020)</div>
                    <div class="car-price">120 شيكل / يومي</div>
                </div>
            </div>

            <div class="car-slide">
                <img src="accent-modern.jpg" alt="هيونداي أكسنت حديثة">
                <div class="car-info">
                    <div class="car-name">هيونداي أكسنت (2023)</div>
                    <div class="car-price">140 شيكل / يومي</div>
                </div>
            </div>

            <div class="car-slide">
                <img src="venue.jpg" alt="هيونداي فينو">
                <div class="car-info">
                    <div class="car-name">هيونداي فينو (2023 - 2025)</div>
                    <div class="car-price">140 شيكل / يومي</div>
                </div>
            </div>

            <div class="car-slide">
                <img src="picanto.jpg" alt="كيا بيكانتو مورنينج">
                <div class="car-info">
                    <div class="car-name">كيا بيكانتو / مورنينج</div>
                    <div class="car-price">90 شيكل / يومي</div>
                </div>
            </div>

            <button class="arrow arrow-next" onclick="changeSlide(-1)"><i class="fas fa-chevron-left"></i></button>
        </div>

        <div class="contact-section">
            <a href="tel:0592662776" class="contact-btn btn-phone">
                <i class="fas fa-phone-alt"></i> إتصل بالشركة
            </a>
            <a href="https://wa.me/972592662776" target="_blank" class="contact-btn btn-whatsapp">
                <i class="fab fa-whatsapp"></i> واتساب الشركة
            </a>
        </div>

        <div class="booking-form">
            <h3>طلب حجز سريع</h3>
            <form id="rentalForm" onsubmit="sendToWhatsapp(event)">
                <div class="form-group">
                    <label for="fullName">الاسم الكامل للزبون:</label>
                    <input type="text" id="fullName" required placeholder="أدخل اسمك الكامل">
                </div>

                <div class="form-group">
                    <label for="carSelect">السيارة والموديل المطلوب:</label>
                    <select id="carSelect" required>
                        <option value="" disabled selected>اختر السيارة المناسبة لك</option>
                        <option value="هيونداي أكسنت 2019-2020 (120 شيكل)">هيونداي أكسنت 2019-2020 — 120 ₪</option>
                        <option value="هيونداي أكسنت 2023 (140 شيكل)">هيونداي أكسنت 2023 — 140 ₪</option>
                        <option value="هيونداي فينو 2023-2025 (140 شيكل)">هيونداي فينو 2023-2025 — 140 ₪</option>
                        <option value="كيا بيكانتو / مورنينج (90 شيكل)">كيا بيكانتو / مورنينج — 90 ₪</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="daysCount">مدة الإيجار المطلوبة (بالأيام):</label>
                    <input type="number" id="daysCount" min="1" required placeholder="مثال: 3 أيام">
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fab fa-whatsapp"></i> احجز الآن عبر الواتساب
                </button>
            </form>
        </div>

    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.car-slide');

        function showSlide(index) {
            slides.forEach(slide => slide.classList.remove('active'));
            if (index >= slides.length) { currentSlide = 0; }
            else if (index < 0) { currentSlide = slides.length - 1; }
            else { currentSlide = index; }
            slides[currentSlide].classList.add('active');
        }

        function changeSlide(direction) {
            showSlide(currentSlide - direction);
        }

        // دالة سحب بيانات العميل وتوجيهها لرقم الواتساب الخاص بالشركة فوراً عند النقر
        function sendToWhatsapp(event) {
            event.preventDefault();

            // رقم واتساب الشركة الفعلي المعتمد
            const companyWhatsappNumber = "972592662776"; 

            const name = document.getElementById('fullName').value;
            const car = document.getElementById('carSelect').value;
            const days = document.getElementById('daysCount').value;

            // صياغة رسالة الحجز التلقائية لتصلك منظمة ومكتوبة بخط عريض
            const textMessage = `*طلب حجز جديد من موقع الويب* 🚗%0A%0A` +
                                `*اسم الزبون:* ${name}%0A` +
                                `*السيارة المختارة:* ${car}%0A` +
                                `*مدة الإيجار:* ${days} أيام%0A%0A` +
                                `الرجاء مراجعة الطلب وتأكيد موعد الاستلام وتجهيز العقد للزبون.`;

            const whatsappUrl = `https://wa.me/${companyWhatsappNumber}?text=${textMessage}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
