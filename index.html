<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="google-site-verification" content="-pweUr0nDcH0wWz_Wa6fZLNBQ-1BSYuTGtPFkb890iQ" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نابلس لتأجير السيارات - Nablus Car Rental</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ffcc00; /* لون الهوية الأصفر/الذهبي للسيارات */
            --dark-color: #111;
            --light-color: #f4f4f4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 4. الخلفية العامة واللوغو */
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 30px 20px;
            width: 100%;
        }

        .logo {
            max-width: 180px; /* حجم اللوغو */
            height: auto;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        /* 1. قائمة السيارات التفاعلية (Carousel) */
        .carousel-container {
            position: relative;
            width: 100%;
            height: 350px;
            overflow: hidden;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 2px solid var(--primary-color);
        }

        .car-slide {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .car-slide.active {
            display: block;
        }

        .car-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* تفاصيل السيارة فوق الصورة */
        .car-info {
            position: absolute;
            bottom: 0;
            right: 0;
            left: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px 15px;
            text-align: right;
        }

        .car-name {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
        }

        .car-price {
            font-size: 1.3rem;
            color: var(--primary-color);
            margin-top: 5px;
            font-weight: bold;
        }

        /* أسهم التنقل (يمين وشمال) */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: var(--primary-color);
            border: none;
            width: 45px;
            height: 45px;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 50%;
            transition: 0.3s;
            z-index: 10;
        }

        .arrow:hover {
            background: var(--primary-color);
            color: #000;
        }

        .arrow-next { left: 15px; }
        .arrow-prev { right: 15px; }

        /* 2. قسم تواصل معنا للشركة */
        .contact-section {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 10px;
        }

        .contact-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            color: #fff;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .btn-phone { background-color: #2b80ff; }
        .btn-whatsapp { background-color: #25D366; }
        
        .contact-btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* 3. نموذج احجز الآن */
        .booking-form h3 {
            color: var(--primary-color);
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #ccc;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #222;
            color: #fff;
            font-size: 1rem;
            text-align: right;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #e6b800;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.4);
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="لوغو نابلس لتأجير السيارات" class="logo">
        <h1>نابلس لتأجير السيارات</h1>
    </header>

    <div class="container">

        <div class="carousel-container">
            <button class="arrow arrow-prev" onclick="changeSlide(1)"><i class="fas fa-chevron-right"></i></button>
            
            <div class="car-slide active">
                <img src="car1.jpg" alt="سيارة 1"> <div class="car-info">
                    <div class="car-name">هيونداي توسان 2024</div>
                    <div class="car-price">250 شيكل / يومي</div>
                </div>
            </div>

            <div class="car-slide">
                <img src="car2.jpg" alt="سيارة 2"> <div class="car-info">
                    <div class="car-name">فولكس واجن جولف الجيل الثامن</div>
                    <div class="car-price">300 شيكل / يومي</div>
                </div>
            </div>

            <div class="car-slide">
                <img src="car3.jpg" alt="سيارة 3"> <div class="car-info">
                    <div class="car-name">كيا سبورتج 2023</div>
                    <div class="car-price">240 شيكل / يومي</div>
                </div>
            </div>

            <button class="arrow arrow-next" onclick="changeSlide(-1)"><i class="fas fa-chevron-left"></i></button>
        </div>

        <div class="contact-section">
            <a href="tel:0590000000" class="contact-btn btn-phone">
                <i class="fas fa-phone-alt"></i> إتصل بالشركة
            </a>
            <a href="https://wa.me/970590000000" target="_blank" class="contact-btn btn-whatsapp">
                <i class="fab fa-whatsapp"></i> واتساب الشركة
            </a>
        </div>

        <div class="booking-form">
            <h3>طلب حجز سريع</h3>
            <form id="rentalForm" onsubmit="sendToWhatsapp(event)">
                <div class="form-group">
                    <label for="fullName">الاسم الكامل:</label>
                    <input type="text" id="fullName" required placeholder="أدخل اسمك الكريم">
                </div>

                <div class="form-group">
                    <label for="carSelect">السيارة المطلوبة:</label>
                    <select id="carSelect" required>
                        <option value="" disabled selected>اختر السيارة من القائمة</option>
                        <option value="هيونداي توسان 2024">هيونداي توسان 2024</option>
                        <option value="فولكس واجن جولف الجيل الثامن">فولكس واجن جولف الجيل الثامن</option>
                        <option value="كيا سبورتج 2023">كيا سبورتج 2023</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="daysCount">عدد أيام الحجز:</label>
                    <input type="number" id="daysCount" min="1" required placeholder="مثال: 3">
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fab fa-whatsapp"></i> احجز الآن عبر الواتساب
                </button>
            </form>
        </div>

    </div>

    <script>
        // كود تشغيل السلايدر (التنقل بين السيارات)
        let currentSlide = 0;
        const slides = document.querySelectorAll('.car-slide');

        function showSlide(index) {
            slides.forEach(slide => slide.classList.remove('active'));
            
            if (index >= slides.length) { currentSlide = 0; }
            else if (index < 0) { currentSlide = slides.length - 1; }
            else { currentSlide = index; }
            
            slides[currentSlide].classList.add('active');
        }

        function changeSlide(direction) {
            showSlide(currentSlide - direction); // تم عكس الاتجاه ليتناسب مع التوجيه من اليمين لليسام
        }

        // كود سحب البيانات وإرسالها إلى الواتساب الخاص بالشركة
        function sendToWhatsapp(event) {
            event.preventDefault(); // منع الصفحة من إعادة التحميل

            // 1. ضع رقم واتساب الشركة هنا (مهم جداً: ابدأ بالمفتاح الدولي بدون + أو أصفار، مثلاً: 97059XXXXXXX)
            const companyWhatsappNumber = "970590000000"; 

            // 2. جلب القيم المدخلة من الزبون
            const name = document.getElementById('fullName').value;
            const car = document.getElementById('carSelect').value;
            const days = document.getElementById('daysCount').value;

            // 3. صياغة الرسالة التي ستصلك على الواتساب من الزبون
            const textMessage = `*طلب حجز جديد من الموقع* 🚗%0A%0A` +
                                `*الاسم:* ${name}%0A` +
                                `*السيارة:* ${car}%0A` +
                                `*المدة:* ${days} أيام%0A%0A` +
                                `الرجاء تأكيد الحجز وتحديد موعد الاستلام.`;

            // 4. فتح رابط الواتساب المباشر
            const whatsappUrl = `https://wa.me/${companyWhatsappNumber}?text=${textMessage}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
